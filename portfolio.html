<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chakner - Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div data-include="header.html"></div>

  <div class="container mt-5">
    <h1 class="text-center mb-4">My Portfolio</h1>

    <ul class="nav nav-pills justify-content-center mb-5" id="portfolio-tab" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-ads">Ads</button>
      </li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-print">Brochure</button>
      </li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill"
          data-bs-target="#tab-illu">Illustration</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-sketch">3D
          Sketch</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-logo">Logo</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-package">Package</button>
      </li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-video">Video</button>
      </li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-web">Website</button>
      </li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="tab-ads">
        <div class="gallery-container" id="list-ads"></div>
      </div>
      <div class="tab-pane fade" id="tab-print">
        <div class="gallery-container" id="list-print"></div>
      </div>
      <div class="tab-pane fade" id="tab-illu">
        <div class="gallery-container" id="list-illu"></div>
      </div>
      <div class="tab-pane fade" id="tab-sketch">
        <div class="gallery-container" id="list-sketch"></div>
      </div>
      <div class="tab-pane fade" id="tab-logo">
        <div class="gallery-container" id="list-logo"></div>
      </div>
      <div class="tab-pane fade" id="tab-package">
        <div class="gallery-container" id="list-package"></div>
      </div>
      <div class="tab-pane fade" id="tab-video">
        <div class="gallery-container" id="list-video"></div>
      </div>
      <div class="tab-pane fade" id="tab-web">
        <div class="gallery-container" id="list-web"></div>
      </div>
    </div>
  </div>

  <div data-include="footer.html"></div>

  <div id="fullscreenPanel" class="fullscreen-panel" onclick="closePanel()">
    <span class="close-btn">&times;</span>
    <img id="panelImage" src="" alt="Zoom View">
  </div>

  <script src="include.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ฟังก์ชันสำหรับอ่านไฟล์ CSV และแปลงเป็นข้อมูลที่ใช้งานได้
    async function getCsvData(folder) {
      try {
        // ไปดึงไฟล์ตามชื่อโฟลเดอร์ เช่น ads/data.csv
        const response = await fetch(`assets/${folder}/${folder}data.csv`);
        const dataText = await response.text();

        const rows = dataText.split('\n').slice(1); // ตัดแถวแรกที่เป็นหัวข้อทิ้ง
        const dataMap = {};

        rows.forEach(row => {
          const [id, title, desc] = row.split(','); // แยกคอลัมน์ด้วยคอมม่า
          if (id) {
            dataMap[id.trim()] = {
              title: title ? title.trim() : '',
              desc: desc ? desc.trim() : ''
            };
          }
        });
        return dataMap;
      } catch (err) {
        console.warn(`ไม่พบไฟล์ข้อมูลในหมวด ${folder}, จะใช้ชื่อเริ่มต้นแทน`);
        return {};
      }
    }

    // ฟังก์ชันหลักที่ใช้ปั๊มรูป
    async function renderGallery(folder, count, targetId) {
      const container = document.getElementById(targetId);
      const dataSource = await getCsvData(folder); // ดึงข้อมูลจาก CSV ก่อน
      let html = '';

      for (let i = 1; i <= count; i++) {
        const imgPath = `assets/${folder}/${folder} (${i}).jpg`;

        // ดึงชื่อจาก CSV ถ้าไม่มีให้ใช้ชื่อไฟล์แทน
        const info = dataSource[i] || { title: `${folder.toUpperCase()} #${i}`, desc: "คลิกเพื่อดูรายละเอียด" };

        html += `
                <div class="gallery-item" onclick="openPanel('${imgPath}')">
                    <img src="${imgPath}" alt="${info.title}" loading="lazy">
                    <div class="overlay">
                        <h3>${info.title}</h3>
                        <p>${info.desc}</p>
                    </div>
                </div>
            `;
      }
      container.innerHTML = html;
    }

    // --- ตั้งค่าจำนวนรูปภาพที่นี่ (แก้แค่ตัวเลข) ---
    renderGallery('ads', 14, 'list-ads');
    renderGallery('print', 11, 'list-print');
    renderGallery('illu', 0, 'list-illu');
    renderGallery('sketch', 10, 'list-sketch');
    renderGallery('logo', 4, 'list-logo');
    renderGallery('package', 3, 'list-package');
    renderGallery('video', 8, 'list-video');
    renderGallery('web', 2, 'list-web');

    // ฟังก์ชันเปิด-ปิด Panel รูปใหญ่
    function openPanel(url) {
      document.getElementById('panelImage').src = url;
      document.getElementById('fullscreenPanel').style.display = 'flex';
    }
    function closePanel() {
      document.getElementById('fullscreenPanel').style.display = 'none';
    }
    // ป้องกันการคลิกขวาบนหน้าเว็บทั้งหมด
    document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    }, false);

    document.onkeydown = function (e) {
      // ป้องกัน F12
      if (event.keyCode == 123) {
        return false;
      }
      // ป้องกัน Ctrl+Shift+I (Inspect)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
        return false;
      }
      // ป้องกัน Ctrl+Shift+C (Element Selector)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
        return false;
      }
      // ป้องกัน Ctrl+Shift+J (Console)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
        return false;
      }
      // ป้องกัน Ctrl+U (View Source)
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
        return false;
      }
    };
  </script>
</body>
</html>
