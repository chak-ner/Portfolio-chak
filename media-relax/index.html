<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAKNER IPTV - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark sticky-top shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">CHAKNER <span class="text-danger">TV</span></span>
    </div>
</nav>

<div class="container-fluid mt-4">
    <ul class="nav nav-pills justify-content-center mb-4" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tv">ทีวีดิจิตอล</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#movies">หนัง</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#series">ซีรีส์</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#anime">การ์ตูน</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tv"><div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3" id="list-tv"></div></div>
        <div class="tab-pane fade" id="movies"><div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3" id="list-movies"></div></div>
        <div class="tab-pane fade" id="series"><div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3" id="list-series"></div></div>
        <div class="tab-pane fade" id="anime"><div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3" id="list-anime"></div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
