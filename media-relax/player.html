<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAKNER TV - Player</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #000; color: white; font-family: 'Kanit', sans-serif; margin: 0; }
        .player-container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .back-btn { color: #888; text-decoration: none; display: inline-block; margin-bottom: 15px; font-size: 0.9rem; transition: 0.3s; }
        .back-btn:hover { color: #e50914; }
        h2 { font-weight: 600; margin: 0 0 5px 0; font-size: 1.5rem; }
        .status-tag { background: #e50914; padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 10px; display: inline-block; }
        
        /* ตกแต่งตัวเล่นวิดีโอ */
        .video-wrapper { 
            background: #111; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .video-js { width: 100%; }
        /* ปรับสีปุ่ม Play ของ Video.js ให้เข้ากับธีมแดง */
        .vjs-matrix.video-js .vjs-big-play-button { border-color: #e50914; }
    </style>
</head>
<body>

<div class="player-container">
    <a href="index.html" class="back-btn">← กลับหน้าหลัก</a>
    
    <div>
        <span class="status-tag">กำลังรับชม</span>
        <h2 id="display-title">ระบบกำลังโหลดวิดีโอ...</h2>
    </div>

    <div class="video-wrapper">
        <video id="my-video" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto">
            <p class="vjs-no-js">กรุณาเปิด JavaScript เพื่อรับชม</p>
        </video>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    // 1. ดึงข้อมูลจาก URL Parameters
    const params = new URLSearchParams(window.location.search);
    const videoUrl = decodeURIComponent(params.get('url'));
    const videoTitle = decodeURIComponent(params.get('title'));

    // 2. แสดงชื่อเรื่อง
    if (videoTitle && videoTitle !== 'null') {
        document.getElementById('display-title').innerText = videoTitle;
        document.title = "กำลังรับชม: " + videoTitle;
    }

    // 3. เริ่มการทำงานของเครื่องเล่น
    const videoElement = document.getElementById('my-video');
    const player = videojs('my-video');

    if (videoUrl && videoUrl !== 'null') {
        // ตรวจสอบว่า Browser รองรับ HLS (เช่น Safari) หรือต้องใช้ Hls.js (เช่น Chrome)
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                player.play().catch(e => console.log("Autoplay blocked, user must click play."));
            });
            
            // จัดการ Error ของ Hls.js
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("HLS Fatal Error:", data.type);
                    document.getElementById('display-title').innerText = "ไม่สามารถโหลดวิดีโอได้ (ลิงก์อาจหมดอายุหรือโดนบล็อก)";
                }
            });
        } 
        // สำหรับ Safari ที่รองรับ HLS ในตัวอยู่แล้ว
        else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            player.src({ src: videoUrl, type: 'application/x-mpegURL' });
            player.play();
        }
    } else {
        document.getElementById('display-title').innerText = "ไม่พบลิงก์วิดีโอ!";
    }
</script>

</body>
</html>
