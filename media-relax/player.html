<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAKNER Anime Player</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .player-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 992px) { .player-grid { grid-template-columns: 1fr; } }
        
        .playlist-card { background: #181818; border-radius: 12px; height: 650px; display: flex; flex-direction: column; border: 1px solid #333; }
        .playlist-header { padding: 15px 20px; border-bottom: 1px solid #333; background: #222; border-radius: 12px 12px 0 0; }
        .playlist-body { flex: 1; overflow-y: auto; padding: 10px; }
        
        .ep-item { 
            display: flex; align-items: center; padding: 10px; color: #aaa; text-decoration: none; 
            border-radius: 8px; margin-bottom: 8px; transition: 0.2s; background: #222; font-size: 0.85rem;
        }
        .ep-item:hover { background: #333; color: #fff; }
        .ep-item.active { background: #e50914; color: #fff; font-weight: 500; }
        .ep-img { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; margin-right: 12px; }
    </style>
</head>
<body>

<div class="container-fluid py-4 px-md-5">
    <a href="index.html" class="text-secondary text-decoration-none mb-3 d-inline-block">← กลับหน้าหลัก</a>
    
    <div class="player-grid">
        <div class="video-section">
            <h2 id="display-title" class="mb-3 fs-4 text-truncate">กำลังโหลด...</h2>
            <div class="video-wrapper shadow-lg">
                <video id="my-video" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto"></video>
            </div>
        </div>

        <div id="playlist-section" class="playlist-card">
            <div class="playlist-header">
                <h6 class="m-0 text-danger">รายการตอนทั้งหมด</h6>
            </div>
            <div class="playlist-body" id="playlist-content">
                </div>
        </div>
    </div>
</div>

<script src="js/data-anime.js"></script>
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    let currentUrl = decodeURIComponent(params.get('url'));
    let currentTitle = decodeURIComponent(params.get('title'));

    const videoElement = document.getElementById('my-video');
    const player = videojs('my-video');
    let hlsInstance = null;

    function playVideo(url, title) {
        if (!url || url === 'null') return;
        document.getElementById('display-title').innerText = title;
        currentUrl = url;

        if (hlsInstance) hlsInstance.destroy();

        if (Hls.isSupported()) {
            hlsInstance = new Hls();
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(videoElement);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => player.play());
        } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }
        updateActiveEP();
    }

    function renderPlaylist() {
        // หาข้อมูล Anime จากชื่อ หรือหาจาก URL ของตอนที่ส่งมา
        const anime = animeData.find(a => 
            a.stations.some(s => s.url === currentUrl)
        );

        if (!anime) return;

        const container = document.getElementById('playlist-content');
        let html = '';
        
        anime.stations.forEach((ep, index) => {
            html += `
                <a href="#" class="ep-item" data-url="${ep.url}" 
                   onclick="playVideo('${ep.url}', '${ep.name}'); return false;">
                    <img src="${ep.image}" class="ep-img">
                    <div class="text-truncate">${ep.name}</div>
                </a>`;
        });
        container.innerHTML = html;
    }

    function updateActiveEP() {
        document.querySelectorAll('.ep-item').forEach(el => {
            el.classList.toggle('active', el.getAttribute('data-url') === currentUrl);
        });
    }

    // เริ่มทำงาน
    renderPlaylist();
    playVideo(currentUrl, currentTitle);
</script>
</body>
</html>
